services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cognify
      POSTGRES_PASSWORD: cognify
      POSTGRES_DB: cognify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognify"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
