services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cognify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cognify}
      POSTGRES_DB: ${POSTGRES_DB:-cognify}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognify"]
      interval: 5s
      timeout: 3s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.5.6
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      COGNIFY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cognify}:${POSTGRES_PASSWORD:-cognify}@postgres:5432/${POSTGRES_DB:-cognify}
      COGNIFY_MILVUS_URI: http://milvus:19530
      COGNIFY_CORS_ALLOWED_ORIGINS: '["http://localhost:3000"]'
      COGNIFY_DEBUG: ${COGNIFY_DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - generated_assets:/app/generated_assets
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      COGNIFY_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cognify}:${POSTGRES_PASSWORD:-cognify}@postgres:5432/${POSTGRES_DB:-cognify}
      COGNIFY_MILVUS_URI: http://milvus:19530
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  milvus_data:
  generated_assets:
