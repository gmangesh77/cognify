# Self-contained E2E test environment.
# No port mappings, no persistent volumes — fully ephemeral.
# Usage: docker compose -f docker-compose.test.yml up -d
#        playwright test tests/e2e/
#        docker compose -f docker-compose.test.yml down

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cognify_test
      POSTGRES_PASSWORD: cognify_test
      POSTGRES_DB: cognify_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognify_test"]
      interval: 3s
      timeout: 2s
      retries: 10

  milvus:
    image: milvusdb/milvus:v2.5.6
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      COGNIFY_DATABASE_URL: postgresql+asyncpg://cognify_test:cognify_test@postgres:5432/cognify_test
      COGNIFY_MILVUS_URI: http://milvus:19530
      COGNIFY_CORS_ALLOWED_ORIGINS: '["http://frontend:3000"]'
      COGNIFY_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
